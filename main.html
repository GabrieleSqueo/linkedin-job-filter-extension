<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 15px;
        width: 400px;
      }
      h1 {
        margin: 0 0 15px 0;
        font-size: 18px;
      }
      .toggle-container {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 15px;
        padding: 10px;
        background-color: #f0f0f0;
        border-radius: 5px;
      }
      .toggle-label {
        font-weight: bold;
        font-size: 14px;
      }
      .toggle-switch {
        position: relative;
        width: 50px;
        height: 26px;
        background-color: #ccc;
        border-radius: 13px;
        cursor: pointer;
        transition: background-color 0.3s;
        border: none;
        padding: 0;
      }
      .toggle-switch.active {
        background-color: #4CAF50;
      }
      .toggle-switch::after {
        content: '';
        position: absolute;
        width: 22px;
        height: 22px;
        background-color: white;
        border-radius: 50%;
        top: 2px;
        left: 2px;
        transition: left 0.3s;
      }
      .toggle-switch.active::after {
        left: 26px;
      }
      #jobList {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      #jobList li {
        padding: 8px;
        margin: 5px 0;
        background-color: #e8f4f8;
        border-left: 4px solid #0077B5;
        font-size: 13px;
      }
      p {
        margin-top: 15px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>Linkedin Filter Extension</h1>
    
    <div class="toggle-container">
      <span class="toggle-label">Filter:</span>
      <button id="toggleFilter" class="toggle-switch active" title="Attiva/Disattiva il filtro"></button>
    </div>

    <ul id="jobList"></ul>
    <p>If it seems to stop working, scroll to the bottom of the page, to let the extension update.</p>
    <script src="popup.js"></script>
  </body>
</html>
